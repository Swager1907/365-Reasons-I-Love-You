/* DATE CALCULATION */

const startDate = new Date("2026-03-09");
const today = new Date();

const diffTime = today - startDate;
const diffDays = Math.floor(diffTime / (1000*60*60*24));
let dayNumber = diffDays % reasons.length;
if(dayNumber < 0) dayNumber = 0;
if(dayNumber > 364){
dayNumber = 364;
}


document.getElementById("day").innerText = "Day " + (dayNumber+1) + " of 365";

/* HEART ANIMATION */
const heartTypes = ["❤️","💖","💗","💘","💞","💕"];

function createHeart() {

const heart = document.createElement("div");

heart.classList.add("heart");

heart.innerText = heartTypes[Math.floor(Math.random() * heartTypes.length)];

heart.style.left = Math.random() * 100 + "vw";

heart.style.animationDuration = (3 + Math.random() * 5) + "s";

document.body.appendChild(heart);

setTimeout(() => {
heart.remove();
}, 8000);

}

setInterval(createHeart,100);

function saveReason(day, text){

let history = JSON.parse(localStorage.getItem("loveHistory")) || [];

/* check if this day already exists */

let alreadySaved = history.find(item => item.day === day + 1);

if(!alreadySaved){

history.push({
day: day + 1,
reason: text
});

localStorage.setItem("loveHistory", JSON.stringify(history));

}

}

const historyButton = document.getElementById("historyButton");
const historyPanel = document.getElementById("historyPanel");
const historyList = document.getElementById("historyList");
const closeHistory = document.getElementById("closeHistory");

historyButton.onclick = function(){

let history = JSON.parse(localStorage.getItem("loveHistory")) || [];
console.log(history);

historyList.innerHTML = "";

history.forEach(item => {

let div = document.createElement("div");

div.innerHTML = "<b>Day " + item.day + "</b><br>" + item.reason + "<hr>";

historyList.appendChild(div);

});

};

closeHistory.onclick = function(){
historyPanel.style.display = "none";
};
